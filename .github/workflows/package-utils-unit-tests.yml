name: Package @safe-global/utils unit tests
on:
  pull_request:
    paths:
      - packages/utils/**
      - packages/store/**
  push:
    branches:
      - main
    paths:
      - packages/**
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    permissions:
      checks: write
      pull-requests: read
      statuses: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      - uses: ./.github/actions/yarn

      # Run tests with coverage
      - name: Run Jest tests with coverage
        run: |
          yarn workspace @safe-global/utils test:coverage \
            --coverageReporters=text \
            --coverageReporters=json-summary \
            --coverageReporters=lcov \
            | tee ./coverage.txt && exit ${PIPESTATUS[0]}

      - name: Jest Coverage Comment
        uses: MishaKav/jest-coverage-comment@25f2818fee93043532f640ad32a7565b4bd4ea9a # v1.0.34
        with:
          title: Package @safe-global/utils coverage
          coverage-summary-path: ./coverage/coverage-summary.json
          coverage-title: Coverage
          coverage-path: ./coverage.txt

      - name: Upload coverage to Datadog
        if: success() && github.event_name == 'push'
        uses: ./.github/actions/upload-coverage
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          site: datadoghq.eu
          coverage-path: packages/utils/coverage
          base-path: packages/utils
          flag: workspace:utils
